name: sharadar-test

# TEMPORARY diagnostic — verifies the NASDAQ_DATA_LINK_API_KEY secret works from
# GitHub Actions (cloud) against Sharadar SEP: auth, license-allows-cloud-call,
# and real pull timing. Never logs the key value (length only). Remove after probe.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Sharadar SEP from cloud
        env:
          NDL_KEY: ${{ secrets.NASDAQ_DATA_LINK_API_KEY }}
        run: |
          set -uo pipefail
          if [ -z "${NDL_KEY:-}" ]; then echo "::error::SECRET MISSING"; exit 1; fi
          echo "secret present, length=${#NDL_KEY}"   # length only — never the value

          GTE=$(date -d '6 days ago' +%Y-%m-%d)
          echo "pulling SHARADAR/SEP date.gte=$GTE (page 1, per_page=10000)"

          START=$(date +%s)
          HTTP=$(curl -sS -o resp.json -w "%{http_code}" \
            "https://data.nasdaq.com/api/v3/datatables/SHARADAR/SEP.json?date.gte=${GTE}&qopts.per_page=10000&api_key=${NDL_KEY}")
          END=$(date +%s)
          echo "HTTP=$HTTP  page1_elapsed=$((END-START))s"

          if [ "$HTTP" != "200" ]; then
            echo "::error::non-200 from NDL (license/auth/cloud-block?)"
            # strip anything that could echo the key, show only the error body shape
            python3 -c "import json;d=json.load(open('resp.json'));print('body:',json.dumps(d)[:400])" 2>/dev/null || head -c 300 resp.json
            exit 1
          fi

          python3 - <<'PY'
          import json
          d=json.load(open('resp.json'))
          dt=d.get('datatable',{}); meta=d.get('meta',{})
          rows=dt.get('data',[]); cols=dt.get('columns',[])
          print('columns:', len(cols), [c.get('name') for c in cols][:8])
          print('rows_page1:', len(rows))
          cur=meta.get('next_cursor_id')
          print('next_cursor:', 'YES (pagination needed)' if cur else 'none (single page)')
          if rows:
              di=[c['name'] for c in cols].index('date') if any(c['name']=='date' for c in cols) else None
              if di is not None:
                  ds=[r[di] for r in rows]
                  print('date range page1:', min(ds), '->', max(ds))
          PY
          echo "PROBE OK"
