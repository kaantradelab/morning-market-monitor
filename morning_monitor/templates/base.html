<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Morning Market Monitor{% endblock %}</title>
  <style>
    /* BUILD TARGET 4 (render) — single-screen monitor. Snapshot, no JS framework.
       Sparklines are inline SVG injected by the `sparkline` filter. Mobile-first. */
    :root {
      --green:#2e7d32; --amber:#f9a825; --red:#c62828; --gray:#9e9e9e;
      --bg:#0f1115; --panel:#181b21; --panel2:#1f232b; --line:#2a2f39;
      --fg:#e7eaf0; --muted:#9aa3b2; --accent:#4f8cff;
      --green-bg:rgba(46,125,50,.16); --amber-bg:rgba(249,168,37,.16);
      --red-bg:rgba(198,40,40,.18); --gray-bg:rgba(158,158,158,.14);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      margin: 0; padding: 0; background: var(--bg); color: var(--fg);
      line-height: 1.45; font-size: 15px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 1rem 1rem 3rem; }

    header.site { border-bottom: 1px solid var(--line); padding-bottom: .75rem; margin-bottom: 1rem; }
    header.site h1 { font-size: 1.15rem; margin: 0 0 .35rem; letter-spacing: .2px; }
    .metabar { color: var(--muted); font-size: .82rem; display: flex; flex-wrap: wrap; gap: .5rem .9rem; align-items: center; }
    .metabar .sep { opacity: .4; }
    .nav { margin-left: auto; display: flex; gap: .8rem; align-items: center; }
    select.datejump {
      background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
      border-radius: 6px; padding: .25rem .4rem; font-size: .8rem;
    }

    /* system temperature */
    .temp { display: inline-flex; align-items: center; gap: .4rem; font-weight: 700; }
    .temp .dot { width: .75rem; height: .75rem; border-radius: 50%; display: inline-block; }
    .badge { display: inline-block; padding: .05rem .45rem; border-radius: 999px; font-size: .72rem; font-weight: 600; }

    h2.section { font-size: .82rem; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); margin: 1.6rem 0 .6rem; border-bottom: 1px solid var(--line); padding-bottom: .3rem; }

    /* cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: .7rem; }
    .card { background: var(--panel); border: 1px solid var(--line); border-left-width: 4px;
      border-radius: 8px; padding: .7rem .8rem; }
    .card.is-banner { grid-column: 1 / -1; }
    .card h3 { margin: 0 0 .2rem; font-size: .98rem; }
    .card .metric { font-size: 1.35rem; font-weight: 700; margin: .1rem 0; }
    .card .score { color: var(--muted); font-size: .85rem; margin-bottom: .4rem; }
    .card .why dt { font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-top: .35rem; }
    .card .why dd { margin: 0; font-size: .85rem; }
    .empty { color: var(--muted); font-style: italic; font-size: .88rem; padding: .3rem 0; }

    /* composites row */
    .composites { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: .6rem; }
    .comp { background: var(--panel); border: 1px solid var(--line); border-left: 4px solid var(--gray);
      border-radius: 8px; padding: .6rem .7rem; }
    .comp .name { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .comp .val { font-size: 1.3rem; font-weight: 700; }
    .comp .pct { font-size: .8rem; color: var(--muted); }

    /* tile grid grouped by axis */
    .axis-group { margin-bottom: 1.1rem; }
    .axis-group > h3 { font-size: .78rem; color: var(--muted); margin: .8rem 0 .4rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em; }
    .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .55rem; }
    .tile { background: var(--panel); border: 1px solid var(--line); border-left-width: 4px;
      border-radius: 8px; padding: .55rem .65rem; display: flex; flex-direction: column; gap: .25rem; }
    .tile .thead { display: flex; justify-content: space-between; align-items: baseline; gap: .4rem; }
    .tile .label { font-size: .85rem; font-weight: 600; }
    .tile .val { font-size: 1.05rem; font-weight: 700; white-space: nowrap; }
    .tile .row { display: flex; flex-wrap: wrap; gap: .25rem .6rem; font-size: .74rem; color: var(--muted); }
    .tile .row b { color: var(--fg); font-weight: 600; }
    .tile .spark { margin-top: .15rem; line-height: 0; }
    .tile.front { box-shadow: inset 0 0 0 1px rgba(79,140,255,.25); }
    .tile .note { font-size: .72rem; color: var(--muted); font-style: italic; }

    .stale-badge { font-size: .68rem; padding: .02rem .35rem; border-radius: 4px;
      border: 1px solid var(--line); color: var(--muted); white-space: nowrap; }
    .stale-badge.is-stale { color: var(--amber); border-color: var(--amber); background: var(--amber-bg); }
    .stale { opacity: .6; }

    /* color helpers */
    .color-green { color: var(--green); } .color-amber { color: var(--amber); }
    .color-red { color: var(--red); }   .color-gray { color: var(--gray); }
    .b-green { border-left-color: var(--green); } .b-amber { border-left-color: var(--amber); }
    .b-red { border-left-color: var(--red); }     .b-gray { border-left-color: var(--gray); }
    .bg-green { background: var(--green-bg); } .bg-amber { background: var(--amber-bg); }
    .bg-red { background: var(--red-bg); }     .bg-gray { background: var(--gray-bg); }
    .dot-green { background: var(--green); } .dot-amber { background: var(--amber); }
    .dot-red { background: var(--red); }     .dot-gray { background: var(--gray); }

    /* calendar / plumbing / dislocations tables */
    table.t { width: 100%; border-collapse: collapse; font-size: .82rem; }
    table.t th { text-align: left; color: var(--muted); font-weight: 600; font-size: .72rem;
      text-transform: uppercase; letter-spacing: .04em; padding: .3rem .5rem; border-bottom: 1px solid var(--line); }
    table.t td { padding: .35rem .5rem; border-bottom: 1px solid var(--line); vertical-align: top; }
    table.t tr.triggered td { background: var(--red-bg); }
    .tag-hi { color: var(--amber); font-weight: 600; }
    .pill { font-size: .68rem; padding: .02rem .4rem; border-radius: 999px; border: 1px solid var(--line); }
    .pill.on { background: var(--red-bg); color: var(--red); border-color: var(--red); }
    .pill.off { color: var(--muted); }

    .archive-list { list-style: none; padding: 0; margin: 0; }
    .archive-list li { padding: .45rem .2rem; border-bottom: 1px solid var(--line); display: flex; gap: .8rem; align-items: baseline; flex-wrap: wrap; }
    .archive-list .d { font-weight: 600; min-width: 7.5rem; }
    .archive-list .am { color: var(--muted); font-size: .85rem; }

    footer.site { margin-top: 2rem; padding-top: .8rem; border-top: 1px solid var(--line);
      color: var(--muted); font-size: .8rem; display: flex; gap: 1rem; flex-wrap: wrap; }

    @media (max-width: 520px) {
      body { font-size: 14px; }
      .metabar { font-size: .76rem; }
      .tiles { grid-template-columns: 1fr 1fr; }
      .nav { width: 100%; margin: .4rem 0 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site">
      <h1>Morning Market Monitor</h1>
      {% block meta %}{% endblock %}
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer class="site">
      {% block footer %}{% endblock %}
    </footer>
  </div>
</body>
</html>
